services:
  db:
    image: postgres:17.9
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /code
          initial_sync: true
          ignore:
            - .pytest_cache
            - .vscode
            - __pycache__
        - action: rebuild
          path: ./backend/requirements.txt
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DB_DATABASE=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - SECRET_KEY=${SECRET_KEY}
      - GOLF_API_BASE_URL=${GOLF_DATA_API_BASE_URL}
      - GOLF_API_KEY=${GOLF_DATA_API_KEY}
    depends_on:
      - db
    
  client-web:
    build: ./client-web
    command: npm run dev
    develop:
      watch:
        - action: sync
          path: ./client-web
          target: /code
          initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: ./client-web/package.json
    volumes:
      - .:/code
      - /code/client-web/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=${API_BASE_URL}
      - VITE_APP_NAME=${APP_NAME}
    depends_on:
      - backend